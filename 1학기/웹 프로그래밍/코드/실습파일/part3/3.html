<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>실습3</title>
        <style>
    table {
      border-collapse: collapse;
    }
    td, th{
      border-bottom: 1px solid green;
      width: 100px;
    }
    th {
      background-color: green;
      color: white;
    }
    tr:nth-child(even) {
      background-color: bisque;
    }
    tr:hover{
      background-color: brown;
      color: white;
    }
</style>

    </head>
    <body>
        <table>
            <tr >
                <th>학번</th>
                <th>이름</th>
                <th>성적</th>
                <th>학점</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Bill</td>
                <td>98</td>
                <td>A+</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Stave</td>
                <td>89</td>
                <td>B+</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Larry</td>
                <td>93</td>
                <td>A+</td>
            </tr>
        </table>
    </body>
</html>
