<!DOCTYPE html>
<html>
  <head>
    <title>안녕하세요</title>
    <meta charset="UTF-8">
    <style>
      /* 테이블 전체 설정 */
      table {
        width: 100%;
        height: 800px; /* 높이를 지정해야 영역이 보입니다 */
        border-collapse: collapse; 
      }

      th, td {
        border: solid 1px;
        text-align: center;
      }

      /* ID와 Class를 HTML 태그에 연결 */
      .for_header {
        height: 60px; /* 제목 영역 높이 */
        width : 100%;
      }

      #left_area {
        width: 30%;
      }

      #right_area {
        width: 70%;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th colspan = "2" class="for_header">상단 제목 영역</th>
      </tr>
      <tr>
        <td id="left_area">좌측 메뉴 영역</td>
        <td id="right_area">콘텐츠 영역</td>
      </tr>
    </table>
  </body>
</html>
