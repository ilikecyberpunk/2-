<!DOCTYPE html>
<html>
  <head>
    <title>연습</title>
    <meta charset = "UTF-8">

    <style>
      .for_font{
        text-align : center;
      }
    </style>
  </head>
  <body style = "background-color:antiquewhite">

    <h1 style = "font-size : 50px; text-align : center;">회원가입</h1>

    <form class = "for_font">

      <label for="fname">아이디</label>
      <input type = "text" id = "fname" name = "fname" placeholder = "아이디를 입력하세요">
      <input type="reset" value = "초기화">
      <br>

      <label for = "pwd">비번</label>
      <input type = "password" name = "pwd" id = "pwd" placeholder = "비밀번호를 입력하세요">
      <input type="reset" value = "초기화">
      <br>

      <label for="man">남자</label>
      <input type="radio" name = "gender" id="man" value = "male">
      <label for = "women">여자</label>
      <input type="radio" name = "gender" id = "women" value = "female">
      <br>

      <label for ="korean">한국인</label>
      <input type="checkbox" name = "한국인" id = "korean" >
      <label for = "american">american</label>
      <input type = "checkbox" name = "미국인" id = "american">
      <br>

      <label for="send"></label>
      <input type="submit" name = "send" id = "send" value = "회원가입">

    </form>


    
    
    
  </body>
</html>
