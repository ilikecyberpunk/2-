<!DOCTYPE html>
<html>
  <head>
    <meta charset = "UTF-8">
    <title>연습장</title>
    <style>
      ul{
        list-style-type : none;
        border-top : solid 2px red;
        border-bottom : solid 2px red;
        padding : 10px;
        text-align : center;
        font-size : 50px;
      }

      ul li{
        display : inline;
        letter-spacing : 10px;
        text-transform : uppercase;
        margin-right : 20px;
      }

      ul li a{
        text-decoration : none;
        color : black
      }
      ul li a:hover{
        text-decoration : underline;
        
      }

      td{
        padding : 50px;  
       }

       tr:nth-child(even){
          background-color : blue;     
       }

    </style>
  </head>
  <body>
    <ul>
      <li><a href = "###">wyd</a></li>
      <li><a href="####">sdfsfdfs</a></li>
    </ul>

    <br>

    <table>
      <tr>
        <td>ㄱㄱㄱ</td>
        <td>ㄴㄴㄴ</td>
      </tr>
      <tr>
        <td>ㄷㄷㄷ</td>
        <td>ㄹㄹㄹ</td>
      </tr>
    </table>
    
  </body>
</html>
