<!DOCTYPE html>
<html>
  <head>
    <meta charset = "UTF-8">
    <title>연습장</title>
    <style>
      .for_header{
        text-align : center;
      }
      input[type = "text"]{
        background-color :bisque;
        border : solid violet 2px;
        border-radius : 10px;
        margin : 0px;
        width : 100%;
        height : 50px;
        box-sizing : border-box;
      }
    </style>
  </head>
  <body>
    <header class = "for_header">
      <h1>상품평</h1>
      <p>받으신 제품을 입력하세요</p>
    </header>

    <main>
      <p>이름</p>
      <input type="text" placeholder="이름">

      <p>이메일</p>
      <input type="text" placeholder="이메일">

      <p>상품 평</p>

    </main>
  </body>
</html>
