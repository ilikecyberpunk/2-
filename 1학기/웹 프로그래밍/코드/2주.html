<!DOCTYPE html>            <!--html문서를 선언한다-->
<html>
    <head> <!--메타 데이터 및 제목, 스타일, 스크립트 등을 포함한다-->
        <title>첨</title>
    </head>
    <body>

        <h1>안녕하세요</h1> 
        <!--h6까지 있고 h1이 가장 크다-->

        <p>이것은 html문서 입니다</p>
        <!--paragragh = 문단을 표시한다-->
        
        <a href="https://lms.kumoh.ac.kr/ko">lms링크</a>
        <!--a태그는 링크임,  이거 절대경로네-->

        <img src="https://www.kumoh.ac.kr/_res/ko/img/common/logo@2x.png" alt="금오공대로고">

        <br>   <!--줄바꿈-->

        
        <input type="button" value="버튼" > 
        <!--클릭 가능한 버튼을 만든다-->

        <br>
        <!--표 태그-->
        <table border = "1"> 
            <tr>
                <th>제목</th>
                <th>제목1</th>
                <th>제목2</th>
            </tr>
            <tr>
                <td>데이터</td>
                <td>데이터1</td>
                <td>데이터2</td>
            </tr>
        </table>
        
        <br>

        <table border = "1">
            <tr>
                <th colspan="2">이름</th> <!--하나의 셀을 여러 개의 열(column)에 걸쳐 합침-->
                <th rowspan="2">직업</th> <!--하나의 셀을 여러 개의 행(row)에 걸쳐 합침-->
            </tr>
            <tr>
                <td>김태호</td>
                <td>alina </td>
            </tr>
        </table>

        <br>
        <table border="1" style="width: 50%; text-align: center;"> <!--- text-align → 텍스트 정렬 방식을 지정하는 속성, center → 가운데 정렬-->
        <tr>
            <th>상품명</th>
            <th>가격</th>
        </tr>
        <tr>
            <td>노트북</td>
            <td>1,000,000원</td>
        </tr>
        </table>

        
    </body>
</html>
