<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('image1_1.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }
        .container {
            display: flex;
            width: 800px;
            margin: 50px auto;
            border: 1px solid #d4a373;
            background-color: #f4e1c6;
        }
        .menu {
            width: 30%;
            background-color: #e3c29d;
            padding: 10px;
        }
        .menu iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
        .content {
            width: 70%;
            padding: 10px;
        }
        .header {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background-color: #e3c29d;
        }
        .content iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu">
            <div class="header">menu</div>
            <iframe src="menu.html"></iframe>
        </div>
        <div class="content">
            <div class="header">인공지능공학과 김태호의 홈페이지</div>
            <iframe src="content.html"></iframe>
        </div>
</body>
</html>
