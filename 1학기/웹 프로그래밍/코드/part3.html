<!-- css -->
                
<!DOCTYPE html>
<html>
    <head>
        <title>part3</title>
        <!-- css는 head에서 style태그 안에 넣는다 -->
        <style>


            /* 내부 스타일 시트 css방법들 */

            /* 선택자 = 스타일을 적용할 html요소 ex h1 p iframe body ... */
            /* 태그 선택자  */
            body{
                background-color : pink;
                font-family: Arial, sens-serif;    /* 글꼴을 지정하는 속성, 항상 마지막에는 serif, sans-serif 같은 일반 글꼴 계열을 넣어야 안전*/
            }
            h1{
                color : white;
                text-align: center;  /*가로 정렬 방식 지정하는 속성 */
            }




            /* 속성 선택자 : 특정 속성을 가진 요소 */
            input[type = "text"]{
                border : 2 solid;  /*solid는 실선을 의미한다*/
            }

            input[type = "password"]{
                border : 1 solid;
            }
            
            /* - ^= : 특정 값으로 시작하는 속성 선택
            - $= : 특정 값으로 끝나는 속성 선택
            - *= : 특정 값을 포함하는 속성 선택 */

            /* html로 끝나는 링크 속성 */
            a[href$= ".html"]{
                color: black;
                text-align : center;
            }




            /* 클래스 선택자 : .을 붙인다 */
            .mydesign1{
                color : blueviolet;
                text-align : center;
                margin : 1; /*요소와 주변 요소 사이의 간격*/
                background-color : greenyellow; 

            }
            .s{
                font-size : small;
            }

            /* 아이디 선택자 */
            #h22{
                text-align : center;
                background-color: blue;
                font-size : large;
            }

            /* 복합 선택자 : 여러 선택자 조합해버리기*/
            .multi:hover{    /*호버기능 = 커서 갖다대면 깜빡임*/
                background-color : orange;
                color : powderblue;
            }

            /* 자손 선택자 */
            /* 부모 요소의 모든 자손 요소에 적용됨 */
            ol li{
                color : blue;
            }

            /* 자식 선택자 */
            /* 자식 선택자는 CSS에서 부모 요소의 ‘직계 자식’만 선택하는 선택자로, 기호 >를 사용합니다. 즉, 손자나 더 깊은 후손은 포함되지 않고 바로 아래 단계의 자식만 스타일을 적용할 수 있습니다 */
            div > h1{
                color : red;
            }

            /* 의사 클래스
                :을 사용하여 특정 상태의 요소를 선택하여 스타일 적용  */
                #li1:hover{
                    text-align : center;
                    color : orange;
                    background-color: blue;
                }

                /* 버튼에 포커스가 맞춰지면 색깔 */
                input[type = "button"]:focus{
                    
                    border : 2px solid red;
                    /* 여기서 solid는 실선이다 */
                }

                /* 버튼을 클릭하고 있는 동안 글씨와 배경 색 */
                .cival:active{
                    color : greenyellow;
                    background-color: antiquewhite;
                }

            /* - <p> 태그 중에서 id="a"를 가진 문단의 글자 크기를 15픽셀로 설정 */
            p #a{
                font-size : 15px;
            }

            p #b{
                font-size :30px;
            }


        /* 색상 지정은 알지?
            color으로 해 */

        /* 택스트 그림자 */
        .shadow_practice{
            color : green;
            text-align: center;
            text-shadow : 10px 10px 10px ; /*x축), 세로(y축), 흐림(blur)*/
        }
        


            
        </style>
    </head>
    <body>
        <h1>test1</h1>
        
        <!-- 인라인 스타일 -->
        <h2 style = "color : white; font-size : 16; text-align : center;">text2</h2>

        <main>
            <ul>
                <li><a href="file:///C:/Users/gtaeh/Desktop/2%ED%95%99%EB%85%84%20%EA%B3%BC%EC%A0%95/1%ED%95%99%EA%B8%B0/%EC%9B%B9%20%ED%94%84%EB%A1%9C%EA%B7%B8%EB%9E%98%EB%B0%8D/%EC%BD%94%EB%93%9C/part3.html">테스트 링크</a></li>
            </ul>
        </main>
        
        <table border = "1">
            <tr>
                <th>아이디</th>
                <td><input type="text" value = "아이디를 입력하세요"></td>
            </tr>
            <tr>
                <th>비번</th>
                <td><input type="password" value = "비번"></td>
            </tr>
        </table>

        <h2 class = mydesign1>안녕하세요</h2>
        <h2 id="h22">shit</h2>
        <h3 class = "multi">스페셜 버튼</h3>

        <div>
            <p>tq</p>
            <h1>tq</h1>
        </div>

        <ol>
            <li>항목1</li>
            <li>항목2</li>
            <li>항목3</li>
        </ol>

        <input  type="button" disabled value="버튼입니다 dd야">  <!--disabled 는 비활성화된 입력필드 -->
        <input class = "cival" type="button" value ="앙">

        <p id = "a">안녕하세요</p>
        <p id = "b">반갑습니다</p>

        <p class = "shadow_practice">그림자야 나오너라 </p>

    </body>
</html>
